<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>CPP Energy Wheel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f4f4;color:#1a1a1a}
/* Toggle bar */
#tbar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e5e5e5;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;gap:10px}
.brand strong{font-size:14px;font-weight:700;color:#B4150B;display:block}
.brand span{font-size:10px;color:#666}
#vbtns{display:flex;background:#ebebeb;border-radius:8px;padding:3px;gap:2px}
#vbtns button{border:none;background:transparent;border-radius:6px;padding:6px 12px;
  font-size:12px;font-weight:600;color:#666;cursor:pointer;
  display:flex;align-items:center;gap:5px;white-space:nowrap}
#vbtns button.on{background:#B4150B;color:#fff}
/* Views */
#wview,#lview{display:none}
#wview.on{display:flex;flex-direction:column;align-items:center;padding:16px 12px 24px;gap:16px}
#lview.on{display:block;padding:12px 12px 24px}
/* SVG */
#wwrap{width:100%;max-width:520px}
#wwrap svg{width:100%;height:auto;display:block}
.rl{font-family:Arial,sans-serif;font-size:8px;font-weight:700;letter-spacing:.04em;fill:#1a1a1a}
.ss{font-family:Arial,sans-serif;font-size:8px;fill:#444}
.sb{font-family:Arial,sans-serif;font-size:8px;font-weight:700;fill:#1a1a1a}
.seg{cursor:pointer}
.seg.dim{opacity:.15}
/* Panel */
#wpanel{width:100%;max-width:660px}
.pc{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px}
.ptitle{font-size:20px;font-weight:700;color:#B4150B;margin-bottom:2px}
.psub{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#B4150B;margin-bottom:14px}
.hint{font-size:13px;color:#666;text-align:center;padding:2.5rem 1rem}
/* Cards */
.cap-list{display:flex;flex-direction:column;gap:8px}
.cap-card{border:1px solid #ddd;border-radius:7px;overflow:hidden;background:#fff}
.cap-hdr{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;background:#f4f4f4;user-select:none}
.cap-hdr.open{background:#B4150B;color:#fff}
.cap-title{font-size:13px;font-weight:500;flex:1;line-height:1.4}
.cap-badges{display:flex;gap:4px;flex-shrink:0}
.bdg-s{background:#B4150B;color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px}
.bdg-a{background:#ddd;color:#555;font-size:9px;font-weight:600;padding:2px 6px;border-radius:3px}
.cap-hdr.open .bdg-s{background:#fff;color:#B4150B}
.cap-hdr.open .bdg-a{background:rgba(255,255,255,.25);color:#fff}
.chev{font-size:12px;flex-shrink:0;transition:transform .2s}
.cap-hdr.open .chev{transform:rotate(180deg)}
.cap-body{display:none;padding:14px;background:#fff}
.cap-body.open{display:block}
.layer{margin-bottom:14px}
.layer:last-child{margin-bottom:0}
.lhdr{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#666;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #e5e5e5;display:flex;align-items:center;gap:6px}
.lhdr.sh{color:#B4150B;border-color:rgba(180,21,11,.2)}
.spill{background:#B4150B;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.clist{display:flex;flex-direction:column;gap:5px}
.crow{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:4px;background:#f4f4f4}
.crow.s{background:#fff6f5;border:1px solid rgba(180,21,11,.18)}
.ds{width:8px;height:8px;border-radius:50%;background:#B4150B;flex-shrink:0;margin-top:5px}
.da{width:6px;height:6px;border-radius:50%;background:#bbb;flex-shrink:0;margin-top:6px}
.ct{font-size:13px;line-height:1.5}
.stag{font-size:9px;font-weight:700;color:#B4150B;padding:2px 5px;background:#ffeee8;border:1px solid rgba(180,21,11,.3);border-radius:3px;flex-shrink:0;align-self:flex-start;margin-top:3px}
/* List view */
.hgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.hbtn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#fff;border:1.5px solid #e5e5e5;border-radius:7px;cursor:pointer;text-align:left;width:100%}
.hbtn.on{border-color:#B4150B;background:#B4150B;color:#fff}
.hic{width:32px;height:32px;border-radius:50%;background:#ebebeb;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:#B4150B}
.hbtn.on .hic{background:rgba(255,255,255,.2);color:#fff}
.hlbl{font-size:13px;font-weight:600;line-height:1.3}
#lpanel{background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:16px;min-height:80px}
#backbtn{display:none;align-items:center;gap:6px;background:transparent;border:1px solid #ddd;border-radius:4px;padding:7px 12px;font-size:13px;color:#666;cursor:pointer;margin-bottom:12px}
#backbtn.on{display:flex}
@media(min-width:700px){
  #wview.on{flex-direction:row;align-items:flex-start;padding:20px;gap:20px}
  #wwrap{max-width:500px;flex-shrink:0}
  #wpanel{flex:1}
}
</style>
</head>

<script>

var SEGS=[

var HICONS={
  gravity:'ti-arrow-bar-down',mechanical:'ti-settings-2',electrical:'ti-bolt',
  pressure:'ti-gauge',temperature:'ti-temperature',chemical:'ti-flask',
  biological:'ti-bug',radiation:'ti-radioactive',sound:'ti-volume',motion:'ti-arrows-move'
};
const DATA2={"biological":{"Biological contamination is contained.":{"stky":[{"text":"Immediately cease work and isolate the contaminated area — do not re-enter until assessed by a competent person"}],"additional":[{"text":"Immediately inform CPP supervisor of suspected contamination"},{"text":"Consider worker daily health status declaration during infectious periods"},{"text":"Develop an infectious disease management plan"},{"text":"Ensure suitable hygiene equipment and supplies are readily available (disinfectant, PPE, gloves)"}]},"People stay clear of biological hazards.":{"stky":[{"text":"Biological hazard areas must be identified, clearly delineated and communicated — workers must not enter without authorisation and appropriate controls"}],"additional":[{"text":"Establish which personnel have medical reactions to venomous creature bites"},{"text":"Ensure snake bite kits are included as part of first aid supplies"},{"text":"Provide information and induction on relevant venomous creatures on the project"}]}},"chemical":{"Chemical hazards are contained.":{"stky":[{"text":"Hazardous chemicals must be stored in a bunded area capable of retaining at least 110% of the largest container, segregated in line with SDS compatibility"}],"additional":[{"text":"Ensure current SDS for all workplace substances are readily available and accessible on site"},{"text":"Ensure all decanted chemical containers are suitably labelled"},{"text":"Suitably segregate chemicals in line with SDS compatibility requirements"},{"text":"Wearers of respiratory PPE shall be trained on its use, cleaning and storage"}]},"Chemical spills and leaks are contained.":{"stky":[{"text":"Immediately stop or isolate the spill source, then contain the spill using appropriate absorbent materials and bunding before clean-up begins"}],"additional":[{"text":"Spill clean-up material must be collected, stored in sealed containers and disposed of off-site by a licensed contractor"}]},"Hazardous atmospheres remain safe.":{"stky":[{"text":"A Confined Space Entry Permit has been completed prior to entry"},{"text":"All energy sources are isolated, locked and tagged before confined space entry"},{"text":"Atmosphere tested and confirmed within safe oxygen levels (19.5%–23.5%) before entry"},{"text":"Atmosphere confirmed outside explosive limits (< 5% LEL) before entry"},{"text":"Atmosphere is continuously monitored while the confined space is occupied"},{"text":"A dedicated standby person is in position controlling access and maintaining communication"},{"text":"Standby person wears a harness with front and back D-Rings at all times while on standby"},{"text":"A confined space specific emergency plan is in place allowing for retrieval of any person"}],"additional":[{"text":"Air Quality Index 101–150 (Unhealthy) — monitor persons with respiratory ailments"},{"text":"Air Quality Index 151–200 (Unhealthy) — consider indoor works, job rotation, P2 breathing mask"},{"text":"Air Quality Index 200–300 (Very Unhealthy) — indoor works, job rotation, P2 mask, consider temporary site shutdown"},{"text":"Air Quality Index 301+ (Hazardous) — indoor works, job rotation, P2 mask, consider temporary site shutdown"},{"text":"Affix tool dust extraction equipment such as a rated vacuum to reduce dust at source"},{"text":"Attempt to adopt processes that generate less dust"},{"text":"Communicate the air quality index rating when it exceeds 100 AQI at pre-start"},{"text":"CPP does not perform asbestos removal — if ACM is suspected, stop work, isolate the area and engage a licensed asbestos assessor"},{"text":"All asbestos removal must be carried out by a licensed asbestos removalist; CPP must retain the waste disposal certificate and clearance certificate"},{"text":"The licensed asbestos removalist (PC) must notify WorkSafe Victoria 5 days prior to removal of friable asbestos"},{"text":"Ensure respiratory PPE (P2 mask) is selected, issued and worn in alignment with the Silica SDS"},{"text":"Ensure the build-up of contaminants or combustible atmosphere is controlled through natural or forced ventilation"},{"text":"Silica dust exposure must not exceed 0.05 mg/m³ in an eight-hour time weighted average"},{"text":"Health monitoring required for workers with ongoing exposure to crystalline silica"},{"text":"Include asbestos requirements in the project induction if ACM may be present on site"},{"text":"Isolate unnecessary persons from high dust generation work processes"},{"text":"Job rotation to ensure workers are not continually exposed to silica dust"},{"text":"Monitor bush fire rating and air quality index via Bureau of Meteorology or equivalent"},{"text":"Where potential fume build-up exists, provide ventilation"}]},"Ignition sources are controlled around flammable substances.":{"stky":[{"text":"All ignition sources must be identified and eliminated or controlled before work involving flammable substances begins — verified by the supervisor prior to commencement"}],"additional":[{"text":"Do not smoke or have open naked flames in the vicinity of fuels or while refuelling"},{"text":"Fuel, oil and chemicals on site must be stored within a bunded area capable of retaining at least 130% of the largest container"},{"text":"No refuelling within 25m of waterways; spill control equipment to be nearby during refuelling"},{"text":"In the event of a fuel, oil or hydraulic fluid leak, immediately stop the source, clean up and report"}]},"People stay out of chemical hazard zones.":{"stky":[{"text":"An exclusion zone is established, physically delineated and maintained around all chemical hazard areas before work begins"}],"additional":[{"text":"Install barriers to delineate work space where hazardous chemicals are used"},{"text":"Verify flammables are removed or protected within the work zone (15 metres)"}]}},"electrical":{"Earthing is applied where required.":{"stky":[{"text":"All mobile plant is directly earthed or has a trailing earth attached"}],"additional":[{"text":"All conductors attached to a running earth system"},{"text":"Tesmec winches to be operated when attached to a purpose-deployed metallic earth grid"}]},"Electrical equipment is isolated before work starts.":{"stky":[{"text":"Insulating gloves (OO) rated for the voltage being worked on are worn"},{"text":"Insulated tools rated for the voltage being worked on are used"},{"text":"Arc rated clothing rated for the identified fault currents is worn where required"},{"text":"All circuits are tested and verified as isolated with a calibrated tester before work starts"},{"text":"Adjacent isolations are locked and tagged to prevent unauthorised re-energisation"},{"text":"Lock Out Tag Out (LOTO) implemented — individual lock and tag placed on all isolation points"},{"text":"Only a qualified person can establish the lockout — equipment shutdown, isolation, releasing stored energy, verifying de-energisation"},{"text":"Written confirmation of electrical isolation obtained and verified on site before work commences"},{"text":"Only work with an Access Authority Permit or equivalent on issue to work on de-energised assets"}],"additional":[{"text":"Only personnel holding appropriate training and authorisations may work in the vicinity of live HV"},{"text":"Only personnel holding appropriate authorisations may perform switching"},{"text":"Ensure all electrical equipment that is out of test date or faulty is tagged and quarantined"},{"text":"Only remove another person's lock or tag after formal written authorisation"},{"text":"Only use portable electrical equipment that has a current test tag and has been visually inspected"},{"text":"Out of date or faulty electrical equipment must be removed from service, tagged and quarantined"},{"text":"Safely discharge tested equipment such as high voltage cables or transformers before contact"},{"text":"Trained licensed electricians, SWMS, Switching Sheets, PPE, LV Rescue equipment and Emergency Management Plan in place"}]},"Isolation is tested before contact.":{"stky":[{"text":"All circuits are tested and verified as isolated with a calibrated tester before contact"},{"text":"Test leads are inspected and confirmed fit for use before testing begins"},{"text":"The test area is clear of unauthorised persons before testing begins"}],"additional":[{"text":"Ensure a testing and maintenance regime is in place, conducted by a competent person"},{"text":"Ensure electrical testing intervals are met (Dec–Feb, Mar–May, Jun–Aug, Sep–Nov)"},{"text":"Establish, communicate and clearly mark the testing zone using flags, cones and barriers"},{"text":"Only work live with a trained observer in position at all times"},{"text":"Use tested and certified plant and equipment and inspect before use"}]},"Live electrical parts are protected by barriers.":{"stky":[{"text":"Two or more of the following are applied: insulating gloves (OO) rated for the voltage are worn; insulated tools are being used; stand on insulated mat; non-conductive barriers are in place to prevent anyone touching live parts accidentally"},{"text":"Live areas are barricaded and signed to prevent unauthorised entry"}],"additional":[{"text":"Arc rated clothing rated for the identified fault currents is worn where required"},{"text":"Protect all exposed live or high-risk services with a physical barrier where inadvertent damage may occur"},{"text":"Implement fencing, barriers, flagging and signage to separate people from live electrical areas"}]},"Safe distances are maintained from electrical hazards.":{"stky":[{"text":"Physical barriers and/or plant limiting devices in place to prevent breaches of HV clearance zones"},{"text":"A spotter is deployed when mobile plant is operating or travelling near live HV"},{"text":"Only authorised personnel are working in the vicinity of live HV"},{"text":"Underground assets are identified, marked and potholed to positively confirm location before any ground penetration"},{"text":"If underground assets cannot be positively identified, non-destructive digging methods must be used"}],"additional":[{"text":"A minimum distance shall be applied from the utility service provider as per their conditions"},{"text":"Determine asset owner requirements regarding approach and NDD methods near underground assets"},{"text":"Ensure a competent Spotter/Observer is deployed throughout excavation near underground electrical assets"},{"text":"Ensure overhead conductors are identified and limits of approach are maintained"},{"text":"Know and maintain Safe Approach Distances to all live electrical installations"},{"text":"Locate overhead power lines and apparatus — communicate and maintain approach and clearance distances"},{"text":"Only use smooth excavation buckets (non-toothed) in the vicinity of known underground electrical assets"},{"text":"Provide all electrical service location information to the Plant Operator and Spotter"},{"text":"Spotter Zone: plant operating between 3.0–6.4m to each side of the conductor and 3.0m above"},{"text":"Where required, deploy a trained electrical spotter that performs no other task"}]}},"gravity":{"Falls are prevented.":{"stky":[{"text":"A properly fitted harness is worn and connected to a rated and/or engineered anchor point at all times when working at height"},{"text":"When not connected to a harness, a hard barrier that will prevent a fall is installed on or near the unprotected edge"},{"text":"An exclusion zone is installed at least 2 metres from any unprotected edge"},{"text":"Edge protection requirements include penetrations and open excavations"},{"text":"A task-specific emergency plan is in place and all required rescue equipment is available on site"}],"additional":[{"text":"A fall restraint technique may be used to prevent a person falling into water when working near open water"},{"text":"Barriers and edge protection such as guard rails must be installed on scaffolding"},{"text":"Ensure all rigging, ladder and anchoring systems are used per manufacturer's specifications"},{"text":"Ensure hook ladder and anchoring systems are inspected prior to use and tagged 3-monthly (RGBY)"},{"text":"Ensure personnel are trained in rescue from heights"},{"text":"Fall prevention equipment to be inspected by an accredited Height Safety Equipment Inspector"},{"text":"Fall restraint equipment must not be attached to scaffolding"},{"text":"Fixed railings or barriers must be installed to prevent personnel or equipment falling into water"},{"text":"Only use EWP anchor points installed and certified by a competent person"},{"text":"Only use fall prevention equipment (harness, lanyards) when trained in their selection and use"},{"text":"Scaffolds at 4 metres or higher must be assembled by a licensed Scaffolder"},{"text":"Use tested and tagged fall arrest equipment and always inspect before use"},{"text":"Visually pre-use inspect gondola anchor points for cracks or obvious signs of fatigue"},{"text":"Visually pre-use inspect conductor trolley for structural integrity and anchor point condition"},{"text":"When practicable, loads should be pre-slung to eliminate the need to work at height"}]},"Ground and structures remain stable.":{"stky":[{"text":"Battering, benching, shoring or boxes are in place before anyone enters an excavation more than 1.5m deep"},{"text":"In Victoria, battering, benching or shoring installed at 1m depth or when any risk of ground collapse exists"},{"text":"Geotechnical certification obtained where standard battering, benching or shoring cannot be applied, or battering angle exceeds 45°"},{"text":"A hard barrier is in place at all open excavation edges to prevent falling in when live edge access is required"},{"text":"Spoil, plant and materials are kept outside the zone of influence by use of barriers"},{"text":"At least one clearly identified access and egress point is in place in all excavations"}],"additional":[{"text":"Check ground and site condition stability before setting up crane or EWP"},{"text":"Check ground conditions and the stability of adjacent structures before starting work"},{"text":"Conduct a site survey to locate and record the position of underground services"},{"text":"Dunnage/outrigger/bearing pads positioned prior to outriggers being deployed and locked into position"},{"text":"Ensure a competent Spotter/Observer is deployed throughout excavation near underground assets"},{"text":"Ensure outriggers are deployed and dunnage is used in areas where the ground is not firm"},{"text":"Inspect ground conditions thoroughly before operating an Elevating Work Platform"},{"text":"Inspect shoring at least weekly, or more frequently depending on weather and site conditions"},{"text":"Mechanical excavation must not occur within 300mm of an underground asset"},{"text":"Obtain written certification from a geotechnical engineer if trench entry is required"},{"text":"Only use smooth excavation buckets (non-toothed) in the vicinity of known underground assets"},{"text":"A permit for ground penetration may be required if excavation is to occur"},{"text":"Pump ground water and discharge appropriately; test water quality before discharge off site"},{"text":"The condition of structures must be assessed by a competent person before commencing"},{"text":"Use a competent person to install and inspect excavation shoring (RIICCM210A)"},{"text":"Where required to suit ground conditions, utilise dunnage/outrigger pads for outrigger operations"}]},"Loads and materials are secured against falling.":{"stky":[{"text":"A lift plan has been developed specifying ground bearing pressure at outriggers, maximum load and reach"},{"text":"Ground bearing capacity is confirmed to meet the lift plan requirements at all outrigger positions"},{"text":"The crane is set up in accordance with the lift plan"},{"text":"Lifting equipment is rated for the load, fit for service and inspected prior to use"},{"text":"The lift will not affect adjacent structures or overhead assets — confirmed via spotter and/or plant limiting devices"},{"text":"An exclusion zone with hard barriers is established around the entire lift area"},{"text":"Crane operator holds a High-Risk Work License (HRWL) for the type of crane being operated"},{"text":"Riggers and Dogmen hold a High-Risk Work License for the activity they are undertaking"},{"text":"Communication protocol established between crane operator and Rigger or Dogman before lift commences"},{"text":"Load weight is known before lifting and plant is rated for the load being lifted"},{"text":"Travelling on slopes is confirmed within operating parameters before moving with a load"},{"text":"Boom and load kept as low to the ground as possible when travelling"},{"text":"Route inspected to avoid sharp turns, uneven ground, obstacles or overhead structures"},{"text":"Ground workers remain visible to the operator at all times"},{"text":"Ground workers do not position themselves between the load and any fixed object"},{"text":"A 16mm tag line is in use to steady and guide the load"}],"additional":[{"text":"Calculate the loads applied to rigging equipment and select gear to suit"},{"text":"Do not exceed the Working Load Limit (WLL) of the EWP inclusive of tools, equipment and persons"},{"text":"Do not walk under a suspended load"},{"text":"Ensure a load chart is affixed to the plant and only described attachments are used"},{"text":"Ensure line worker and equipment are secured/tethered to the conductor trolley"},{"text":"Ensure line worker, tools and equipment are directly secured to the gondola"},{"text":"Ensure rigging equipment is within inspection date (RGBY) and in good working order prior to use"},{"text":"Ensure rigging is installed without slack to minimise potential for shock loading"},{"text":"Ensure the gondola is used in accordance with manufacturer's specifications"},{"text":"A lift study must be conducted at 75% or greater of maximum rated capacity"},{"text":"Lifting points must not be attached to quick hitch buckets"},{"text":"Only operate an excavator as a crane within its labelled rated capacity (≤75%)"},{"text":"Only perform lifting operations with a licenced Crane Operator relevant to the crane capacity"},{"text":"Only use a licensed Rigger or Dogger to determine the rigging method"},{"text":"Operate the crane within its Rated Capacity ≤75%"},{"text":"Operator must hold a Verification of Competency for the type of plant being operated"},{"text":"The person slinging the load must hold a valid Dogging or Rigging licence"},{"text":"The rated capacity must be clearly displayed on the plant and not exceeded"},{"text":"Visually inspect rigging equipment prior to use to ensure it is in good working order"}]},"People stay out of drop zones.":{"stky":[{"text":"An exclusion zone with hard barriers or crowd fencing is established directly below and around all lifting or elevated work areas before work begins"}],"additional":[{"text":"Ensure only essential personnel enter the drop zone; communicate to workers working aloft"},{"text":"Establish drop zone(s), barricade, flag and communicate to all on site"},{"text":"Establish and delineate drop zones for conductor trolley operations"}]}},"mechanical":{"Mechanical equipment is isolated before work starts.":{"stky":[{"text":"Only a qualified person can establish the mechanical lockout — equipment shutdown, isolation, releasing stored energy, verifying de-energisation"},{"text":"Tag, lock and test all mechanical isolations before starting work"},{"text":"Individual lock and tag placed on all mechanical isolation points"}],"additional":[{"text":"Conduct plant pre-start check, report faults and tag plant out of use if unsuitable"},{"text":"Ensure all pre-operational checks are conducted; tag out of service if a fault is detected"},{"text":"Keys removed or plant locked out when not in use"},{"text":"Never leave an EWP unattended while in operation — keys removed or other isolation applied"},{"text":"Out of date or faulty mechanical equipment must be removed from service, tagged and quarantined"},{"text":"Stored mechanical energy (springs, hydraulic accumulators, counterweights) confirmed released or secured before work starts"},{"text":"Hydraulic systems to be depressurised and locked out before any work commences"}]},"Moving parts are guarded.":{"stky":[{"text":"All guards must be in place and confirmed operational before machinery is started — machinery must not be operated with guards removed or bypassed"}],"additional":[{"text":"Blade guard in place and operational on all cutting and grinding equipment"},{"text":"Only use undamaged diamond and composite abrasive blades that are fit for purpose"},{"text":"Toothed blades are not permitted — thrown tips, reactive forces and kickback hazards"},{"text":"Guards must be installed wherever rotating or moving parts are exposed"}]},"Stored energy is released or secured before work starts.":{"stky":[{"text":"All stored energy sources (mechanical, hydraulic, pneumatic, electrical) must be identified, released or secured before any work commences — verified by the person doing the work"}],"additional":[{"text":"Stored mechanical energy (springs, hydraulic accumulators, counterweights) confirmed released or secured before work starts"},{"text":"Hydraulic systems to be depressurised and locked out before any work commences"},{"text":"Electrical energy stored in capacitors or UPS systems must be discharged before contact"},{"text":"Never leave an EWP unattended while elevated — keys removed or isolation applied"}]}},"motion":{"Equipment remains under control at all times.":{"stky":[{"text":"All vehicle occupants are wearing a properly fitted seatbelt"},{"text":"Vehicle operators inspect vehicles before use and ensure the vehicle is properly maintained"},{"text":"Vehicle safety systems (traction control, lane departure warning, autonomous braking where fitted) are operational"},{"text":"Do not operate or touch a mobile phone while driving"},{"text":"Remain drug and alcohol free while operating any vehicle"},{"text":"Slow down in rain, fog, darkness and when on roads in poor condition"},{"text":"Do not speed"}],"additional":[{"text":"All vehicles must be regularly inspected and maintained per the manufacturer's requirements"},{"text":"Booms lowered and lifting stopped if lightning is within 30km or wind speed exceeds manufacturer specifications"},{"text":"Drivers must comply with speed limits and traffic signage on all roads, depots and construction sites"},{"text":"Drivers must hold a current state or territory driver's licence"},{"text":"Drivers must not be impaired by prescription or over-the-counter medication"},{"text":"Drivers must not be under the influence of illicit drugs"},{"text":"Drivers must plan their journey, considering driving times and routes to manage fatigue"},{"text":"Do not operate the EWP above wind speed of 12.5 m/s or as per manufacturer's specifications"},{"text":"Only operate mobile plant with the relevant licence or plant operator certification and current VOC"},{"text":"Prepare vehicle journey management planning for long journeys >3 hours with a single driver"}]},"Exclusion zones are in place and maintained.":{"stky":[{"text":"Exclusion zones with barriers, fencing or bunting must be physically in place and clearly marked before plant begins operating"}],"additional":[{"text":"Physically delineate exclusion zones with crowd fencing, barriers, flagging and signage"},{"text":"Mobile plant operating exclusion zones must be established, blind spots identified and communicated to all on site"}]},"Loads are secured against movement.":{"stky":[{"text":"All loads must be verified as secured before any vehicle moves — load restraint method confirmed appropriate for load type and route"}],"additional":[{"text":"All loads shall be appropriately restrained via rope, chains or nylon straps"},{"text":"Ensure an appropriate load restraint method and tie-down points are used"},{"text":"Ensure any tow vehicles and trailer capacity is suitable for the load"},{"text":"Ensure load is spread evenly across axles as much as practicable"},{"text":"Ensure loads do not exceed vehicle mass or dimension limits"},{"text":"Ensure the loading/unloading route and storage area is planned and free of obstructions"},{"text":"Ensure the load has not moved during transport before unloading"},{"text":"Ensure vehicles are not loaded to exceed mass or dimension limits"},{"text":"Heavy vehicles and their loads must comply with mass and dimension requirements"},{"text":"The weight of a loaded trailer must not exceed the towing capacity of the vehicle"},{"text":"Use a direct restraint method for loads that are difficult to tie down"}]},"People and moving equipment are kept apart.":{"stky":[{"text":"Exclusion zones with barriers, fencing or bunting established and clearly marked around plant operating areas"},{"text":"Blind spots identified and communicated to all relevant site workers"},{"text":"Communication methods established between operator, spotter/observer and all workers before work starts"},{"text":"Ground workers must remain in the operator's line of sight at all times"},{"text":"Spotter and operator agree on signals before work starts"},{"text":"Spotter is positioned in a safe, visible location with a clear escape route"},{"text":"A spotter is used when mobile plant is reversing"},{"text":"A spotter is used when operating and travelling in live substations"},{"text":"Traffic Control Plans / Traffic Guidance schemes in place where required, with devices implemented accordingly"},{"text":"Work zone protected with barriers, cones, crash attenuators or buffer vehicles"},{"text":"Work vehicle positioned between workers and live traffic"},{"text":"Never work in front of an unprotected vehicle"},{"text":"Vehicle movement plans developed, communicated and implemented"},{"text":"Traffic controllers hold current traffic management training"}],"additional":[{"text":"Activities must cease if unauthorised persons or plant enter the exclusion zone"},{"text":"All non-essential persons must be removed from the plant operating area"},{"text":"Ensure the mobile plant is deployed away from excavation zone of influence"},{"text":"Establish and delineate loading/unloading zones via flagging, cones and barriers"},{"text":"Implement fencing, barriers, flagging and signage to separate pedestrians from plant and vehicles"},{"text":"Mobile plant operation to cease when non-essential personnel are within 5 metres of the operating zone"},{"text":"Only allow entry to a mobile plant exclusion zone after approval from Operator or Spotter"},{"text":"Only essential and authorised persons such as spotters are allowed in the exclusion zone while plant is operating"},{"text":"Provide pedestrians with safe passage around or through the worksite"},{"text":"Where practicable, install plant zone entry/exit boom gates"}]},"Safety systems are fitted and working.":{"stky":[{"text":"Plant has working reversing alarms, mirrors and flashing beacons"},{"text":"Plant has a functioning E-Stop"},{"text":"Vehicle safety systems (traction control, lane departure warning, autonomous braking where fitted) are operational"}],"additional":[{"text":"All powered mobile plant to be fitted with rotating amber beacon and reverse warning devices"},{"text":"Ensure audible beepers and flashing beacons are functioning on all plant"}]}},"pressure":{"People stay out of pressure hazard zones.":{"stky":[{"text":"An exclusion zone is established, physically delineated and maintained around all active pressure hazard areas"}],"additional":[{"text":"All energy sources are isolated, locked and tagged before entry to pressure hazard areas"},{"text":"All suspected pressurised services within the work zone must be positively identified and marked"},{"text":"Written confirmation of isolation must be obtained and verified on site before work commences"}]},"Pressure is isolated before work starts.":{"stky":[{"text":"All pressure systems must be confirmed at zero pressure before any connections are broken or work commences"}],"additional":[{"text":"Air compressor valves must be rated for the relevant pressure"},{"text":"Pressure vessels to be inspected and/or tested by a competent person before use"},{"text":"Purge vessels to remove hazardous concentrations until lowest safe levels are reached"},{"text":"Hose Whip Checks or Coupling Safety Locks to be fitted to all hoses"},{"text":"Ensure hose burst control valves are fitted and clearly signposted on the plant"}]},"Pressure systems remain contained.":{"stky":[{"text":"Pressure systems are inspected and confirmed intact with no leaks before work commences"}],"additional":[{"text":"Dead man or fast-acting automatic cut-off device switches to be used at all times"},{"text":"Hose Whip Checks or Coupling Safety Locks to be fitted to all hoses"},{"text":"Pump operator positioned where the pump, boom and person tending the hose are visible at all times"},{"text":"All suspected pressurised services within the work zone must be positively identified and marked"}]},"Stored pressure is released before work starts.":{"stky":[{"text":"Depressurise all pressure systems and confirm zero pressure before breaking any connections or commencing work"}],"additional":[{"text":"Dead man or fast-acting automatic cut-off device switches to be used at all times; hoses uncoiled when in use"},{"text":"Hose Whip Checks or Coupling Safety Locks to be fitted to all hoses"},{"text":"Ensure hose burst control valves are fitted and signage indicates their location"},{"text":"Bleed all pneumatic lines and confirm zero pressure before disconnecting fittings"}]}},"radiation":{"Exposure to radiation is controlled.":{"stky":[{"text":"Radiation hazard areas must be clearly delineated, signposted and access controlled — only authorised and trained personnel may enter"}],"additional":[{"text":"Radiation exposure levels must be monitored continuously and must not exceed the regulated dose limits"},{"text":"RPE (Radiation Protection Equipment) must be worn when entering designated radiation areas"},{"text":"Personal dosimeters to be worn and records maintained for all persons working in radiation areas"},{"text":"Only trained and authorised personnel may work in or near radiation hazard areas"}]}},"sound":{"Hazardous noise exposure to workers, visitors and the public is identified and managed within applicable exposure limits.":{"stky":[{"text":"A noise assessment has been completed and noise-generating work areas and tasks are identified before work commences"},{"text":"Engineering controls (enclosures, barriers, silencers) are applied at the source before hearing PPE is relied upon"},{"text":"Workers with ongoing exposure to hazardous noise are enrolled in a health monitoring program"}],"additional":[{"text":"Noise exposure must not exceed 85 dB(A) time weighted average for 8 hours"},{"text":"Noise exposure must not exceed 140 dB(A) peak"},{"text":"Arrange work schedules and job rotation to minimise noise exposure duration for individuals"},{"text":"Consider dampening technology or enclosures to isolate workers from hazardous noise at source"},{"text":"Hazardous noise signage to be displayed in all affected areas"},{"text":"Verify mufflers and baffles are fitted and working as designed on equipment that emits hazardous noise"},{"text":"Sign all areas where potential hazardous noise exists"}]},"Access to hazardous noise areas is controlled, and hearing protection is used where required.":{"stky":[{"text":"Hazardous noise areas are physically delineated with barriers or bunting, clearly signposted, and access is controlled before noise-generating work starts"},{"text":"Hearing protection must be worn by all persons in designated hazardous noise areas — verified before work commences and monitored throughout"}],"additional":[{"text":"Ensure the required hearing PPE is worn — hard hat, full face shield, eye and hearing protection where applicable"},{"text":"Supply and train workers on the correct selection, fit, use and storage of hearing PPE"},{"text":"Install physical barriers, screens and acoustic shields to block or interrupt the path of hazardous noise"},{"text":"Restrict access to noise areas to essential personnel only"},{"text":"Communicate hazardous noise area boundaries to visitors and the public before site access"}]}},"temperature":{"Exposure to heat and cold is controlled.":{"stky":[{"text":"Work must stop or be rescheduled when conditions exceed safe thermal exposure limits — supervisor must verify conditions before work commences"}],"additional":[{"text":"Actively monitor extreme heat/cold weather conditions throughout the shift"},{"text":"Provide cold climate PPE such as gloves, high visibility jackets, beanie, etc."},{"text":"Provide information on suggested hydration requirements"},{"text":"Provide information on methods to manage extreme weather conditions"},{"text":"Provide a source of clean, cool water accessible to all workers"}]},"Fire protection controls are available and effective.":{"stky":[{"text":"Appropriate fire extinguishers or water supply must be confirmed available within 10 metres before any hot work or ignition-risk activity begins"}],"additional":[{"text":"A mobile water tanker with at least 1000 litres capacity and motorised pump to be available on site during hot works"},{"text":"When cutting or grinding, use water sprays, chemical additives or a vacuum to reduce heat and fumes"}]},"Ignition sources are controlled.":{"stky":[{"text":"A Hot Work Permit must be issued and all conditions implemented in full before any hot work commences"}],"additional":[{"text":"Any restrictions or requirements from fire authorities must be implemented and complied with"},{"text":"Appropriate type and number of fire extinguishers available or water supply within 10 metres"},{"text":"At the completion of work, verify all ignition sources are extinguished and recheck before leaving the area"},{"text":"Do not smoke or have open naked flames in the vicinity of fuels"},{"text":"Establish a Hot Works Bay/Area"},{"text":"Hot Work Permit requirements to be communicated within the project induction"},{"text":"Monitor bush fire rating and air quality index via Bureau of Meteorology"},{"text":"On days of Total Fire Ban or high fire danger, permits must be obtained from the appropriate authority"},{"text":"Where practicable, place a non-combustible shield to prevent emission of sparks, hot metal or slag"},{"text":"A mobile water tanker with at least 1000 litres and motorised pump, or fire hose within 10m of hot work"}]},"People stay out of thermal hazard zones.":{"stky":[{"text":"An exclusion zone must be established around all thermal hazard areas and communicated to all on site before work begins"}],"additional":[{"text":"Verify flammables are removed or protected within the work zone (15 metres)"}]}}};

var curSel=null,openCap=null,lSel=null,lOpen=null;

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function ctrlRow(c,stky){
  return '<div class="crow'+(stky?' s':'')+'"><div class="'+(stky?'ds':'da')+'"></div>'
    +'<div class="ct">'+esc(c.text)+'</div>'+(stky?'<span class="stag">STKY</span>':'')+'</div>';
}

function capCard(name,layers,idx,pfx,openName){
  var sc=(layers.stky||[]).length, ac=(layers.additional||[]).length, isOpen=(openName===name);
  var body='';
  if(sc){body+='<div class="layer"><div class="lhdr sh"><span class="spill">STKY</span> Controls</div><div class="clist">'+(layers.stky||[]).map(function(c){return ctrlRow(c,true);}).join('')+'</div></div>';}
  if(ac){body+='<div class="layer"><div class="lhdr">Additional Controls</div><div class="clist">'+(layers.additional||[]).map(function(c){return ctrlRow(c,false);}).join('')+'</div></div>';}
  return '<div class="cap-card" id="'+pfx+'c'+idx+'">'
    +'<div class="cap-hdr'+(isOpen?' open':'')+'" data-n="'+esc(name)+'" data-p="'+pfx+'" onclick="toggleCap(this)">'
    +'<span class="cap-title">'+esc(name)+'</span>'
    +'<span class="cap-badges">'+(sc?'<span class="bdg-s">STKY: '+sc+'</span>':'')+(ac?'<span class="bdg-a">'+ac+' controls</span>':'')+'</span>'
    +'<span class="chev">&#9660;</span></div>'
    +'<div class="cap-body'+(isOpen?' open':'')+'">'+body+'</div></div>';
}

function toggleCap(el){
  var n=el.getAttribute('data-n'), p=el.getAttribute('data-p');
  var tmp=document.createElement('div'); tmp.innerHTML=n; n=tmp.textContent||tmp.innerText||n;
  if(p==='w'){openCap=(openCap===n)?null:n; renderW();}
  else{lOpen=(lOpen===n)?null:n; renderL();}
}

function sv(v){
  document.getElementById('wview').classList.toggle('on',v==='w');
  document.getElementById('lview').classList.toggle('on',v==='l');
  document.getElementById('bw').classList.toggle('on',v==='w');
  document.getElementById('bl').classList.toggle('on',v==='l');
  if(v==='l'){buildGrid();renderL();}
}

function selectSeg(id){
  curSel=(curSel===id&&id!==null)?null:id;
  openCap=null;
  document.querySelectorAll('.seg').forEach(function(g){
    if(curSel){g.classList.toggle('dim',g.getAttribute('data-id')!==curSel);}
    else{g.classList.remove('dim');}
  });
  renderW();
}

function renderW(){
  var p=document.getElementById('wpanel');
  if(!curSel){p.innerHTML='<div class="hint"><i class="ti ti-hand-click" style="font-size:20px;vertical-align:-3px;margin-right:6px"></i>Tap a hazard to see controls</div>';return;}
  var seg=null;
  for(var i=0;i<SEGS.length;i++){if(SEGS[i].id===curSel){seg=SEGS[i];break;}}
  var ed=DATA2[curSel];
  if(!ed){p.innerHTML='<div class="hint">No data.</div>';return;}
  var cards='';
  var keys=Object.keys(ed);
  for(var j=0;j<keys.length;j++){cards+=capCard(keys[j],ed[keys[j]],j,'w',openCap);}
  p.innerHTML='<div class="pc"><div class="ptitle">'+seg.lbl+'</div><div class="psub">We have capacity when:</div><div class="cap-list">'+cards+'</div></div>';
}

function buildGrid(){
  var g=document.getElementById('hgrid');
  if(g.children.length)return;
  var html='';
  for(var i=0;i<SEGS.length;i++){
    var s=SEGS[i];
    html+='<button class="hbtn" data-id="'+s.id+'" onclick="lsel(this)">'
      +'<span class="hic"><i class="ti '+HICONS[s.id]+'"></i></span>'
      +'<span class="hlbl">'+s.lbl+'</span></button>';
  }
  g.innerHTML=html;
}

function lsel(btn){
  var id=btn.getAttribute('data-id');
  lSel=id; lOpen=null;
  document.querySelectorAll('.hbtn').forEach(function(b){b.classList.toggle('on',b===btn);});
  document.getElementById('backbtn').classList.add('on');
  renderL();
  setTimeout(function(){document.getElementById('lpanel').scrollIntoView({behavior:'smooth',block:'nearest'});},80);
}

function lback(){
  lSel=null;lOpen=null;
  document.querySelectorAll('.hbtn').forEach(function(b){b.classList.remove('on');});
  document.getElementById('backbtn').classList.remove('on');
  renderL();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderL(){
  var p=document.getElementById('lpanel');
  if(!lSel){p.innerHTML='<div class="hint"><i class="ti ti-hand-click" style="font-size:20px;vertical-align:-3px;margin-right:6px"></i>Tap a hazard above</div>';return;}
  var seg=null;
  for(var i=0;i<SEGS.length;i++){if(SEGS[i].id===lSel){seg=SEGS[i];break;}}
  var ed=DATA2[lSel];
  if(!ed){p.innerHTML='<div class="hint">No data.</div>';return;}
  var cards='';
  var keys=Object.keys(ed);
  for(var j=0;j<keys.length;j++){cards+=capCard(keys[j],ed[keys[j]],j,'l',lOpen);}
  p.innerHTML='<div class="ptitle">'+seg.lbl+'</div><div class="psub">We have capacity when:</div><div class="cap-list">'+cards+'</div>';
}

/* SVG click handling — works on desktop and iOS */
(function(){
  var svg=document.getElementById('wsvg');
  if(!svg)return;

  function onTap(e){
    /* For touch events, get the element under the first touch point */
    var el;
    if(e.type==='touchend'){
      var t=e.changedTouches[0];
      el=document.elementFromPoint(t.clientX,t.clientY);
    } else {
      el=e.target;
    }
    /* Walk up from tapped element to find .seg or logo */
    var node=el;
    while(node && node!==svg){
      if(node.id==='logohit'){selectSeg(null);return;}
      if(node.classList && node.classList.contains('seg')){
        selectSeg(node.getAttribute('data-id'));
        return;
      }
      node=node.parentNode;
    }
    selectSeg(null);
  }

  svg.addEventListener('touchend', onTap, false);
  svg.addEventListener('click', onTap, false);
})();

/* Start in list view on phones */
if(window.innerWidth<700){sv('l');}
</script>
</body>
</html>
